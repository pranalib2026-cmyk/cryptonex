# ═══════════════════════════════════════════════════
# Nginx Reverse Proxy — CryptoNex
# Routes: / → frontend  /api → backend  /analysis → FastAPI  /ws → WebSocket
# ═══════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ──────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    server_tokens off;

    # ─── Gzip ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ─── Rate Limiting Zones ──────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=100r/m;
    limit_req_zone $binary_remote_addr zone=analysis:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=general:10m  rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ─── Upstreams ────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    upstream backend {
        server backend:4000;
        keepalive 16;
    }

    upstream analysis {
        server analysis:8000;
        keepalive 4;
    }

    # ─── HTTP → enforce same origin, light redirect ─
    server {
        listen 80;
        server_name _;

        # Nginx-level health endpoint (for Docker health checks)
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        # ─── Security Headers (applied to all locations) ─
        add_header X-Frame-Options          "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options   "nosniff"                      always;
        add_header X-XSS-Protection         "1; mode=block"                always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header X-Robots-Tag             "index, follow"                always;

        # ─── Frontend (Static SPA) ───────────────
        location / {
            limit_req  zone=general burst=30 nodelay;
            limit_conn conn 20;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_cache_control;

            # Cache static assets at the proxy layer
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|mp4|webp)$ {
                proxy_pass http://frontend;
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ─── Backend REST API ─────────────────────
        location /api/ {
            limit_req  zone=api burst=20 nodelay;
            limit_conn conn 10;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  30s;
            proxy_connect_timeout 10s;
            proxy_send_timeout  30s;

            # CORS pre-flight passthrough
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
        }

        # ─── WebSocket (live price stream) ───────
        location /ws {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── Python Analysis Engine ───────────────
        location /analysis/ {
            limit_req  zone=analysis burst=5 nodelay;
            rewrite    ^/analysis/(.*) /$1 break;
            proxy_pass         http://analysis;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_connect_timeout 15s;
        }
    }

    # ─── HTTPS (SSL — uncomment once cert is provisioned) ─
    # Paste your cert paths into /etc/nginx/ssl/ and uncomment:
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     # ... same location blocks as above ...
    # }
    #
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
