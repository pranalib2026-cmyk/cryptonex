# ═══════════════════════════════════════════════════════════
# GitHub Actions — CI/CD Pipeline
# Triggers: push to main/develop, PRs to main
# Jobs: backend-test → analysis-test → frontend-check → build → deploy
# ═══════════════════════════════════════════════════════════

name: CryptoNex CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/cryptonex

jobs:

  # ─── 1. Lint & Test Backend (Node.js) ──────────────────
  backend-test:
    name: "Backend — Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Lint (ESLint)
        working-directory: ./server
        run: npx --yes eslint . --ext .js --max-warnings 0 || true

      - name: Unit tests
        working-directory: ./server
        run: node tests/analysis.test.js

  # ─── 2. Lint & Test Analysis Engine (Python) ───────────
  analysis-test:
    name: "Analysis Engine — Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: analysis-engine/requirements.txt

      - name: Install dependencies
        working-directory: ./analysis-engine
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: ./analysis-engine
        run: pip install ruff && ruff check . || true

      - name: Type check (pyright)
        working-directory: ./analysis-engine
        run: pip install pyright && pyright . || true

      - name: Smoke-test FastAPI startup
        working-directory: ./analysis-engine
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
          kill %1

  # ─── 3. Validate Docker Compose ────────────────────────
  compose-validate:
    name: "Docker Compose — Config Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config --quiet

  # ─── 4. Build & Push Docker Images ─────────────────────
  build:
    name: "Build Docker Images"
    runs-on: ubuntu-latest
    needs: [backend-test, analysis-test, compose-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # ── Frontend image ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend image ──
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: infrastructure/docker/Dockerfile.backend
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Analysis Engine image ──
      - name: Build & push analysis engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.analysis
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-analysis:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-analysis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 5. Deploy to VPS ──────────────────────────────────
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/cryptonex

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Pulling new images..."
            docker compose pull

            echo "→ Rotating services (zero-downtime where possible)..."
            docker compose up -d --remove-orphans

            echo "→ Running DB migrations / SQL init..."
            docker compose exec -T postgres psql -U cryptonex -d cryptonex \
              -f /docker-entrypoint-initdb.d/init.sql 2>/dev/null || true

            echo "→ Removing dangling images..."
            docker image prune -f

            echo "→ Service status:"
            docker compose ps

            echo "✔ CryptoNex deployed successfully at $(date -u)"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            curl -sf http://localhost/health || (echo "❌ Nginx health check failed" && exit 1)
            curl -sf http://localhost/api/health || (echo "❌ Backend health check failed" && exit 1)
            curl -sf http://localhost/analysis/health || (echo "❌ Analysis engine health check failed" && exit 1)
            echo "✔ All health checks passed"
